<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOHAMED ASIK K — Flutter Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --bg: #070912;
      --bg-elev: #0d1120;
      --bg-elev-2: #121728;
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f1f3f9;
      --text-dim: #9aa3b8;
      --text-faint: #5b6478;
      --accent-1: #7c5cff;
      --accent-2: #4f8dfd;
      --accent-grad: linear-gradient(120deg, var(--accent-1), var(--accent-2));
      --success: #35d68a;
      --shadow: 0 20px 60px rgba(9, 12, 26, 0.55);
      --radius-lg: 22px;
      --radius-md: 14px;
      --radius-sm: 9px;
      color-scheme: dark;
    }

    [data-theme="light"] {
      --bg: #f6f6fb;
      --bg-elev: #ffffff;
      --bg-elev-2: #f0f1f8;
      --card-border: rgba(20, 20, 40, 0.08);
      --text: #14162a;
      --text-dim: #5d6272;
      --text-faint: #9296a6;
      --shadow: 0 20px 50px rgba(30, 30, 60, 0.10);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-2);
      font-weight: 500;
    }

    .section-heading {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(26px, 3.2vw, 34px);
      margin-top: 8px;
      letter-spacing: -0.02em;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .grad-text {
      background: var(--accent-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* reveal on scroll */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s cubic-bezier(.16, .8, .24, 1), transform 0.8s cubic-bezier(.16, .8, .24, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ---------- Starfield bg (hero, dark only) ---------- */
    .starfield {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--text);
      border-radius: 50%;
      opacity: 0.5;
    }

    /* ---------- Nav ---------- */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 78%, transparent);
      border-bottom: 1px solid var(--card-border);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      max-width: 1180px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.01em;
    }

    .logo span {
      color: var(--accent-1);
    }

    .nav-links {
      display: flex;
      gap: 34px;
      list-style: none;
    }

    .nav-links a {
      font-size: 14.5px;
      color: var(--text-dim);
      font-weight: 500;
      position: relative;
      padding: 4px 0;
      transition: color 0.25s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .nav-links a.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -6px;
      height: 2px;
      border-radius: 2px;
      background: var(--accent-grad);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: var(--bg-elev-2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: transform 0.35s cubic-bezier(.34, 1.56, .64, 1), background 0.3s ease;
    }

    .theme-toggle:hover {
      transform: rotate(20deg) scale(1.06);
    }

    .burger {
      display: none;
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: var(--bg-elev-2);
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .mobile-menu {
      display: none;
      flex-direction: column;
      gap: 4px;
      padding: 10px 32px 20px;
      border-bottom: 1px solid var(--card-border);
      background: var(--bg-elev);
    }

    .mobile-menu a {
      padding: 12px 4px;
      color: var(--text-dim);
      font-size: 15px;
      border-bottom: 1px solid var(--card-border);
    }

    .mobile-menu.open {
      display: flex;
    }

    @media (max-width: 860px) {
      .nav-links {
        display: none;
      }

      .burger {
        display: flex;
      }
    }

    /* ---------- Buttons ---------- */
    .btn {
      border: none;
      border-radius: 11px;
      padding: 13px 26px;
      font-size: 14.5px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: transform 0.25s cubic-bezier(.34, 1.56, .64, 1), box-shadow 0.3s ease, background 0.3s ease;
    }

    .btn-primary {
      background: var(--accent-grad);
      color: white;
      box-shadow: 0 10px 30px -8px rgba(124, 92, 255, 0.65);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 34px -8px rgba(124, 92, 255, 0.8);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1.4px solid var(--card-border);
    }

    .btn-outline:hover {
      transform: translateY(-3px);
      border-color: var(--accent-1);
    }

    .btn-block {
      width: 100%;
      justify-content: center;
    }

    .btn-whatsapp {
      background: #25D366;
      color: #06210f;
      box-shadow: 0 10px 30px -8px rgba(37, 211, 102, 0.55);
    }

    .btn-whatsapp:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 34px -8px rgba(37, 211, 102, 0.7);
    }

    /* ---------- Hero ---------- */
    .hero {
      position: relative;
      padding: 90px 0 130px;
      overflow: hidden;
    }

    .hero-inner {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 50px;
      align-items: center;
    }

    .badge-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 15px;
      border-radius: 30px;
      border: 1px solid var(--card-border);
      background: var(--bg-elev-2);
      font-size: 12.5px;
      font-weight: 600;
      color: var(--accent-2);
      margin-bottom: 22px;
    }

    .badge-pill::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-2);
    }

    .hero h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(38px, 5.2vw, 58px);
      line-height: 1.06;
      letter-spacing: -0.02em;
    }

    .hero h2 {
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: clamp(19px, 2.4vw, 24px);
      color: var(--text-dim);
      margin-top: 10px;
    }

    .hero p {
      margin-top: 20px;
      max-width: 460px;
      color: var(--text-dim);
      font-size: 15.5px;
      line-height: 1.7;
    }

    .hero-ctas {
      display: flex;
      gap: 14px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .social-row {
      display: flex;
      gap: 14px;
      margin-top: 34px;
    }

    .social-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      transition: all 0.25s ease;
    }

    .social-icon:hover {
      color: white;
      background: var(--accent-grad);
      border-color: transparent;
      transform: translateY(-3px);
    }

    /* Hero visual */
    .hero-visual {
      position: relative;
      height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
    }

    .blob-1 {
      width: 340px;
      height: 340px;
      background: var(--accent-1);
      top: -20px;
      right: 10px;
      opacity: 0.28;
    }

    .blob-2 {
      width: 260px;
      height: 260px;
      background: var(--accent-2);
      bottom: -10px;
      left: 0;
      opacity: 0.22;
    }

    .hero-portrait-wrapper {
      position: relative;
      width: 400px;
      height: 520px;
      border-radius: 0;
      overflow: visible;
      border: none;
      box-shadow: none;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      z-index: 2;
    }

    .hero-portrait-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.4));
    }

    .avatar-silhouette {
      width: 78%;
      height: 92%;
    }

    .hero-floating-badge {
      position: absolute;
      background: rgba(15, 16, 25, 0.76);
      backdrop-filter: blur(8px);
      border: 1.5px solid rgba(124, 92, 255, 0.3);
      padding: 8px 16px;
      border-radius: 99px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 10px rgba(124, 92, 255, 0.1);
      transition: all 0.25s ease;
      z-index: 3;
    }

    .hero-floating-badge:hover {
      transform: scale(1.05);
      border-color: #8b5cf6;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 0 15px rgba(124, 92, 255, 0.25);
      color: #a78bfa;
    }

    .badge-react {
      bottom: 24%;
      left: -20px;
    }

    .badge-python {
      top: 26%;
      right: -30px;
    }

    .badge-mysql {
      bottom: 8%;
      right: -10px;
    }

    .badge-decorator-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid rgba(124, 92, 255, 0.5);
      background: transparent;
      z-index: 2;
      bottom: 12%;
      left: 20%;
    }

    .hero-ctas .btn {
      border-radius: 99px;
      padding: 12px 26px;
    }

    .hero-ctas .btn-primary {
      background: var(--accent-grad);
      border: 1.5px solid transparent;
      box-shadow: 0 0 20px rgba(124, 92, 255, 0.45);
    }

    .hero-ctas .btn-primary:hover {
      box-shadow: 0 0 30px rgba(124, 92, 255, 0.7);
      transform: translateY(-3px);
    }

    .hero-ctas .btn-outline {
      border: 1.5px solid rgba(124, 92, 255, 0.4);
      background: transparent;
      color: #ffffff;
      transition: all 0.25s ease;
    }

    .hero-ctas .btn-outline:hover {
      background: rgba(124, 92, 255, 0.08);
      border-color: #8b5cf6;
      transform: translateY(-3px);
      box-shadow: 0 0 20px rgba(124, 92, 255, 0.2);
    }

    .typing-cursor {
      color: var(--accent-2);
      font-weight: 300;
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0;
      }

      50% {
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero p {
        margin-left: auto;
        margin-right: auto;
      }

      .hero-ctas,
      .social-row {
        justify-content: center;
      }

      .hero-visual {
        margin-top: 40px;
      }

      .badge-react {
        left: 10%;
      }

      .badge-python {
        right: 10%;
      }

      .badge-mysql {
        right: 15%;
      }
    }

    @media (max-width: 900px) {
      .hero-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .hero p {
        margin-left: auto;
        margin-right: auto;
      }

      .hero-ctas,
      .social-row {
        justify-content: center;
      }

      .hero-visual {
        margin-top: 40px;
      }
    }

    /* Hero entrance + idle motion */
    @keyframes heroFadeUp {
      from {
        opacity: 0;
        transform: translateY(26px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes heroVisualIn {
      from {
        opacity: 0;
        transform: scale(0.88) translateY(18px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes floatY {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }

    @keyframes floatYsmall {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-9px);
      }
    }

    @keyframes blobPulse {

      0%,
      100% {
        opacity: var(--blob-op, 0.28);
        filter: blur(60px);
      }

      50% {
        opacity: calc(var(--blob-op, 0.28) * 1.5);
        filter: blur(72px);
      }
    }

    @keyframes bounceDown {

      0%,
      100% {
        transform: translateY(0);
        opacity: 0.55;
      }

      50% {
        transform: translateY(7px);
        opacity: 1;
      }
    }

    @keyframes gradShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .hero-copy>* {
      opacity: 0;
      animation: heroFadeUp 0.9s cubic-bezier(.16, .8, .24, 1) forwards;
    }

    .hero-copy>*:nth-child(1) {
      animation-delay: 0.05s;
    }

    .hero-copy>*:nth-child(2) {
      animation-delay: 0.16s;
    }

    .hero-copy>*:nth-child(3) {
      animation-delay: 0.28s;
    }

    .hero-copy>*:nth-child(4) {
      animation-delay: 0.4s;
    }

    .hero-copy>*:nth-child(5) {
      animation-delay: 0.52s;
    }

    .hero-copy>*:nth-child(6) {
      animation-delay: 0.64s;
    }

    .grad-text {
      background-size: 200% 200%;
      animation: gradShift 6s ease-in-out infinite;
    }

    .hero-visual-in {
      animation: heroVisualIn 0.9s cubic-bezier(.16, .8, .24, 1) 0.3s both;
    }

    .float-slow,
    .float-a,
    .float-b {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .float-slow {
      animation: floatY 6.5s ease-in-out infinite;
    }

    .float-a {
      animation: floatYsmall 5.5s ease-in-out infinite;
      animation-delay: 0.4s;
    }

    .float-b {
      animation: floatYsmall 5s ease-in-out infinite reverse;
      animation-delay: 0.2s;
    }

    .blob-1 {
      --blob-op: 0.28;
      animation: blobPulse 7s ease-in-out infinite;
    }

    .blob-2 {
      --blob-op: 0.22;
      animation: blobPulse 8.5s ease-in-out infinite 1s;
    }

    .scroll-cue {
      position: absolute;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) rotate(90deg);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      animation: bounceDown 2.2s ease-in-out infinite;
      z-index: 2;
    }

    @media (prefers-reduced-motion: reduce) {

      .hero-copy>*,
      .hero-visual-in,
      .float-slow,
      .float-a,
      .float-b,
      .blob-1,
      .blob-2,
      .scroll-cue,
      .grad-text {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

    /* ---------- Section base ---------- */
    section {
      padding: 90px 0;
      position: relative;
    }

    .section-tag {
      display: flex;
      flex-direction: column;
      margin-bottom: 44px;
    }

    /* ---------- About ---------- */
    .about-header-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 50px;
    }

    .about-tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 99px;
      border: 1px solid rgba(124, 92, 255, 0.35);
      background: rgba(124, 92, 255, 0.07);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-1);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .about-header-wrapper h2 {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: clamp(34px, 4.5vw, 48px);
      margin-top: 14px;
    }

    .about-header-subtitle {
      font-size: 16px;
      color: var(--text-dim);
      margin-top: 12px;
      font-weight: 400;
    }

    .about-grid-mockup {
      display: grid;
      grid-template-columns: 4.8fr 7.2fr;
      gap: 50px;
      align-items: center;
    }

    .about-portrait-outer {
      position: relative;
      background: rgba(15, 16, 25, 0.3);
      border-radius: 36px;
      padding: 24px;
      border: 1.5px solid rgba(124, 92, 255, 0.12);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(124, 92, 255, 0.05);
      transition: all 0.35s ease;
    }

    .about-portrait-outer:hover {
      border-color: rgba(124, 92, 255, 0.28);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 50px rgba(124, 92, 255, 0.15);
    }

    .about-portrait-inner {
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 0.95;
      background: #0f1019;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .about-portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .about-portrait-decor-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(124, 92, 255, 0.8);
      background: transparent;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      box-shadow: 0 0 8px rgba(124, 92, 255, 0.4);
    }

    .about-content-heading {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(24px, 3.2vw, 36px);
      line-height: 1.25;
      color: #ffffff;
    }

    .about-content-desc {
      font-size: 15.5px;
      color: var(--text-dim);
      line-height: 1.75;
      margin-top: 18px;
      margin-bottom: 24px;
    }

    .about-info-card {
      background: rgba(13, 17, 32, 0.65);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 16px 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
      margin-bottom: 28px;
    }

    .about-info-item {
      display: grid;
      grid-template-columns: 36px 120px 1fr;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .about-info-item:last-child {
      border-bottom: none;
    }

    .about-info-icon {
      color: var(--accent-1);
      display: flex;
      align-items: center;
    }

    .about-info-label {
      font-size: 13.5px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .about-info-value {
      font-size: 14.5px;
      color: #ffffff;
      font-weight: 600;
    }

    .about-ctas {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .about-ctas .btn {
      border-radius: 99px;
      padding: 12px 26px;
    }

    .about-ctas .btn-primary {
      background: var(--accent-grad);
      border: 1.5px solid transparent;
      box-shadow: 0 0 20px rgba(124, 92, 255, 0.45);
    }

    .about-ctas .btn-primary:hover {

      background: rgba(124, 92, 255, 0.08);

        grid-template-columns: 1fr;

    /* ---------- Skills ---------- */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .skill-card {
      background: var(--bg-elev);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 26px 22px;
      text-align: center;
      transition: transform 0.3s cubic-bezier(.34, 1.4, .64, 1), border-color 0.3s ease;
    }

    .skill-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent-1);
    }

    .skill-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .skill-name {
      font-weight: 700;
      font-size: 15px;
      font-family: 'Sora', sans-serif;
    }

    .skill-sub {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 3px;
      margin-bottom: 16px;
    }

    .skill-bar {
      height: 5px;
      border-radius: 4px;
      background: var(--bg-elev-2);
      overflow: hidden;
    }

    .skill-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--accent-grad);
      width: 0%;
      transition: width 1.4s cubic-bezier(.16, .8, .24, 1);
    }

    @media (max-width: 860px) {
      .skills-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .skills-grid {
        grid-template-columns: 1fr;
      }

    .skill-group {
      margin-bottom: 46px;
    }

    .skill-group:last-child {
      margin-bottom: 0;
    }

    .skill-group-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .skill-group-head .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-grad);
    }

    .skill-group-title {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 17px;
    }

    .skill-group-title span {
      color: var(--text-faint);
      font-weight: 500;
      font-size: 13px;
      margin-left: 6px;
    }

    /* ---------- Certificates ---------- */
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .cert-card {
      background: #0f1019;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 30px 24px 24px;
      position: relative;
      transition: transform 0.3s cubic-bezier(.34, 1.56, .64, 1), border-color 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .cert-card:hover {
      transform: translateY(-8px);
      border-color: rgba(124, 92, 255, 0.4);
      box-shadow: 0 10px 30px rgba(124, 92, 255, 0.08), 0 0 2px rgba(124, 92, 255, 0.2);
    }

    .cert-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 20px;
    }

    .cert-issuer-badge {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #a78bfa;
      background: rgba(124, 92, 255, 0.09);
      padding: 6px 12px;
      border-radius: 99px;
      border: 1px solid rgba(124, 92, 255, 0.25);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    .cert-rosette {
      color: #a78bfa;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cert-title-header {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 19px;
      line-height: 1.35;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .cert-meta-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .cert-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.65);
    }

    .cert-meta-icon {
      color: #a78bfa;
      display: flex;
      align-items: center;
      opacity: 0.85;
    }

    .cert-desc {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.52);
      margin-bottom: 22px;
      flex-grow: 1;
    }

    .cert-tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }

    .cert-hash-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 4px 10px;
      border-radius: 6px;
    }

    .cert-action-button {
      width: 100%;
      padding: 11px 0;
      border-radius: 99px;
      background: rgba(124, 92, 255, 0.04);
      border: 1.5px solid rgba(124, 92, 255, 0.4);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s ease;
      cursor: pointer;
      margin-top: auto;
    }

    .cert-action-button:hover {
      background: rgba(124, 92, 255, 0.15);
      border-color: #8b5cf6;
      box-shadow: 0 4px 20px rgba(124, 92, 255, 0.25);
      transform: scale(1.02);
    }

    @media (max-width: 900px) {
      .cert-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .cert-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ---------- Projects ---------- */
    .projects-section-container {
      overflow: hidden;
      position: relative;
    }

    .projects-header-centered {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 2;
    }

    .projects-header-centered h2 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(32px, 5vw, 42px);
      font-weight: 800;
      line-height: 1.15;
      margin-top: 10px;
      letter-spacing: -0.02em;
    }

    .projects-header-centered h2 span {
      display: block;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .projects-bg-glow {
      position: absolute;
      top: 5%;
      left: 20%;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: var(--accent-1);
      filter: blur(100px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 1;
    }

    .projects-slider-wrapper {
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      overflow: visible;
      padding: 20px 0 50px;
      z-index: 2;
    }

    .projects-slider-track {
      display: flex;
      gap: 24px;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: grab;
      user-select: none;
    }

    .projects-slider-track:active {
      cursor: grabbing;
    }

    .projects-slider-track.dragging {
      transition: none;
    }

    .project-card {
      --card-w: 370px;
      background: radial-gradient(circle at bottom right, rgba(124, 92, 255, 0.18) 0%, transparent 60%), #0D0F17;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 40px 32px 32px;
      flex: 0 0 var(--card-w);
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease, border-color 0.3s ease, box-shadow 0.5s ease;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      opacity: 0.3;
      transform: scale(0.9);
      transform-style: preserve-3d;
    }

    [data-theme="light"] .project-card {
      background: radial-gradient(circle at bottom right, rgba(124, 92, 255, 0.14) 0%, transparent 60%), var(--bg-elev);
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
    }

    .project-card.active {
      opacity: 1;
      transform: scale(1);
      border-color: rgba(124, 92, 255, 0.35);
      box-shadow: var(--shadow);
      transform-style: preserve-3d;
    }

    .project-card:hover {
      border-color: var(--accent-1);
    }

    .project-card-num,
    .project-card-category,
    .project-card-title,
    .project-card-tech-section,
    .project-card-mockup-wrapper {
      transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateZ(0px);
    }

    .project-card.active:hover .project-card-num {
      transform: translateZ(50px);
    }

    .project-card.active:hover .project-card-category {
      transform: translateZ(30px);
    }

    .project-card.active:hover .project-card-title {
      transform: translateZ(40px);
    }

    .project-card.active:hover .project-card-tech-section {
      transform: translateZ(25px);
    }

    .project-card.active:hover .project-card-mockup-wrapper {
      transform: translateZ(65px);
    }

    .project-card-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .project-card-num {
      font-family: 'Sora', sans-serif;
      font-size: 72px;
      font-weight: 800;
      line-height: 0.8;
      color: var(--text);
      letter-spacing: -0.04em;
    }

    .project-card-category {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dim);
      opacity: 0.95;
      padding-bottom: 6px;
    }

    .project-card-title {
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-top: 24px;
      line-height: 1.25;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .project-card-tech-section {
      margin-top: 14px;
      flex-grow: 1;
      margin-bottom: 24px;
    }

    .tech-label {
      font-family: 'Inter', sans-serif;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text-dim);

    }

    .tech-list {
      font-family: 'Inter', sans-serif;

    .project-card-mockup-wrapper {

    /* Mock Window elements */

    return () => window.removeEventListener("portfolio_new_lead", handleNews);
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    if (username === "admin" && password === "asik2004") {
      setIsLoggedIn(true);
      setLoginError("");
    } else {
      setLoginError("Invalid Admin Credentials!");
    }
  };

  const saveConfig = (updatedData) => {
    setData(updatedData);
    localStorage.setItem("portfolio_data", JSON.stringify(updatedData));

  const handleSaveGeneral = (e) => {
    e.preventDefault();
    saveConfig({ ...data, hero: heroForm, about: aboutForm, contact: contactForm });

  };

  const handleSaveSkills = (e) => {
    e.preventDefault();
    saveConfig({ ...data, skills: skillsList });
    alert("Skills settings saved!");
  };

  const handleSaveProjects = (e) => {
    e.preventDefault();
    saveConfig({ ...data, projects: projectsList });
    alert("Projects settings saved!");
  };

  const handleSaveCerts = (e) => {
    e.preventDefault();
    saveConfig({ ...data, certificates: certsList });
    alert("Certificates settings saved!");
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setAboutForm({ ...aboutForm, avatarUrl: reader.result });
      };
      reader.readAsDataURL(file);
    }
  };

  const handleHeroImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setHeroForm({ ...heroForm, avatarUrl: reader.result });
      };
      reader.readAsDataURL(file);
    }
  };

  const handleResumeUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setHeroForm({ ...heroForm, resumeUrl: reader.result });
      };
      reader.readAsDataURL(file);
    }
  };

  const handleProjImageUpload = (idx, e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        handleProjChange(idx, "imageUrl", reader.result);
      };
      reader.readAsDataURL(file);
    }
  };

    const next = { ...skillsList };
    next[cat][idx][key] = val;
    setSkillsList(next);
  };

    const next = { ...skillsList };

    const next = [...projectsList];
    next[idx][key] = val;
    setProjectsList(next);
  };

    const next = [...certsList];
    next[idx][key] = val;
    setCertsList(next);
  };

      const res = await fetch(window.location.href);

      const end = text.indexOf("};\n\nconst PortfolioContext =");

        // Fallback to Config download
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });

        a.href = URL.createObjectURL(blob);
        a.download = "portfolio_config.json";
        a.click();
        alert("Config downloaded as backup file!");
        return;

      const serial = JSON.stringify(data, null, 2);

                <div style={{ background: "#121728", padding: "16px", borderRadius: "10px", textAlign: "center" }}>

                  <div style={{ fontSize: "12px", color: "#9aa3b8" }}>Projects</div>
                </div>
                <div style={{ background: "#121728", padding: "16px", borderRadius: "10px", textAlign: "center" }}>
                  <h3 style={{ fontSize: "22px" }}>{leadsList.length}</h3>
                  <div style={{ fontSize: "12px", color: "#9aa3b8" }}>Inbox Leads</div>
                </div>
              </div>
            </div>

          {activeTab === "hero" && (
            <form onSubmit={handleSaveGeneral}>
              <div className="cpanel-card">
                <div className="cpanel-card-title">Hero Information</div>

                  <div className="cpanel-input-group"><label>First Name</label><input className="cpanel-input" value={heroForm.firstName} onChange={e=>setHeroForm({...heroForm, firstName:e.target.value})}/></div>
                  <div className="cpanel-input-group"><label>Last Name</label><input className="cpanel-input" value={heroForm.lastName} onChange={e=>setHeroForm({...heroForm, lastName:e.target.value})}/></div>
                  <div className="cpanel-input-group cpanel-form-full"><label>Role / Subhead</label><input className="cpanel-input" value={heroForm.role} onChange={e=>setHeroForm({...heroForm, role:e.target.value})}/></div>
                  <div className="cpanel-input-group cpanel-form-full"><label>Hero Biography</label><textarea className="cpanel-input cpanel-textarea" value={heroForm.bio} onChange={e=>setHeroForm({...heroForm, bio:e.target.value})}/></div>
                  <div className="cpanel-input-group cpanel-form-full">
                    <label>Upload Resume (PDF/DOC)</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                      {heroForm.resumeUrl && heroForm.resumeUrl.startsWith("data:") && <span style={{fontSize: "12px", color: "#35d68a"}}>File Selected ✓</span>}
                      <input type="file" accept=".pdf,.doc,.docx" className="cpanel-input" onChange={handleResumeUpload} style={{ flex: 1 }} />
                    </div>
                  </div>
                  <div className="cpanel-input-group cpanel-form-full">
                    <label>Upload Hero Avatar Image</label>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                      <img src={heroForm.avatarUrl} alt="Hero Preview" style={{ width: '40px', height: '40px', borderRadius: '8px', objectFit: 'cover' }} />
                      <input type="file" accept="image/*" className="cpanel-input" onChange={handleHeroImageUpload} style={{ flex: 1 }} />
                    </div>
                  </div>
                </div>
              </div>

              <div className="cpanel-card">
                <div className="cpanel-card-title">About Me details</div>
                <div className="cpanel-form-grid">
                  <div className="cpanel-input-group"><label>Display Name</label><input className="cpanel-input" value={aboutForm.name} onChange={e=>setAboutForm({...aboutForm, name:e.target.value})}/></div>
                  <div className="cpanel-input-group"><label>Experience text</label><input className="cpanel-input" value={aboutForm.experience} onChange={e=>setAboutForm({...aboutForm, experience:e.target.value})}/></div>
                  <div className="cpanel-input-group"><label>Email address</label><input className="cpanel-input" value={aboutForm.email} onChange={e=>setAboutForm({...aboutForm, email:e.target.value})}/></div>
                  <div className="cpanel-input-group"><label>Location</label><input className="cpanel-input" value={aboutForm.location} onChange={e=>setAboutForm({...aboutForm, location:e.target.value})}/></div>
                  <div className="cpanel-input-group cpanel-form-full"><label>Headline</label><input className="cpanel-input" value={aboutForm.headline} onChange={e=>setAboutForm({...aboutForm, headline:e.target.value})}/></div>
                  <div className="cpanel-input-group cpanel-form-full"><label>About Bio Description</label><textarea className="cpanel-input cpanel-textarea" value={aboutForm.bio} onChange={e=>setAboutForm({...aboutForm, bio:e.target.value})}/></div>
                  
                  <div className="cpanel-input-group cpanel-form-full">

                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>

              </div>

                  <div className="cpanel-input-group"><label>GitHub Url</label><input className="cpanel-input" value={heroForm.socials.github} onChange={e=>setHeroForm({...heroForm, socials:{...heroForm.socials, github:e.target.value}})}/></div>
                  <div className="cpanel-input-group"><label>LinkedIn Url</label><input className="cpanel-input" value={heroForm.socials.linkedin} onChange={e=>setHeroForm({...heroForm, socials:{...heroForm.socials, linkedin:e.target.value}})}/></div>

                  <div className="cpanel-input-group"><label>Twitter Url</label><input className="cpanel-input" value={heroForm.socials.twitter} onChange={e=>setHeroForm({...heroForm, socials:{...heroForm.socials, twitter:e.target.value}})}/></div>

          {activeTab === "skills" && (

                          const next = { ...skillsList };
                          next[cat].splice(idx, 1);
                          setSkillsList(next);

                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <button className="cpanel-btn cpanel-btn-primary" onClick={handleSaveSkills}>Save Skills</button>
            </div>
          )}

          {activeTab === "projects" && (

              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: "8px", marginBottom: "15px" }}>

                  <div style={{ display: "flex", flexWrap: "wrap", gap: "6px", alignItems: "center" }} key={idx}>
                    <input className="cpanel-input" style={{ width: "70px" }} value={p.num} onChange={e=>handleProjChange(idx, "num", e.target.value)} placeholder="Num"/>
                    <input className="cpanel-input" style={{ flex: 1 }} value={p.title} onChange={e=>handleProjChange(idx, "title", e.target.value)} placeholder="Title"/>

                    <input className="cpanel-input" style={{ flex: 2 }} value={p.tech} onChange={e=>handleProjChange(idx, "tech", e.target.value)} placeholder="Tech"/>

                      const next = [...projectsList];
                      next.splice(idx, 1);
                      setProjectsList(next);

                      <div className="cpanel-input-group"><label>Date Issued</label><input className="cpanel-input" value={c.date} onChange={e=>handleCertChange(idx, "date", e.target.value)} /></div>
                      <div className="cpanel-input-group"><label>Credential ID</label><input className="cpanel-input" value={c.id} onChange={e=>handleCertChange(idx, "id", e.target.value)} /></div>
                    </div>
                    <div className="cpanel-input-group" style={{ marginBottom: "8px" }}><label>Description</label><input className="cpanel-input" value={c.desc} onChange={e=>handleCertChange(idx, "desc", e.target.value)} /></div>
                    <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                      <div className="cpanel-input-group" style={{ flex: 1 }}><label>Tags (comma separated)</label><input className="cpanel-input" value={Array.isArray(c.tags)?c.tags.join(", "):c.tags} onChange={e=>handleCertChange(idx, "tags", e.target.value.split(",").map(t=>t.trim()))} /></div>
                      <button className="cpanel-btn cpanel-btn-danger" style={{ marginTop: "16px", padding: "6px 12px", fontSize: "11px" }} onClick={() => {
                        const next = [...certsList];
                        next.splice(idx, 1);
                        setCertsList(next);
                      }}>Delete Certificate</button>
                    </div>
                  </div>
                ))}
              </div>
              <button className="cpanel-btn cpanel-btn-primary" onClick={handleSaveCerts}>Save Certificates</button>
            </div>
          )}

          {activeTab === "leads" && (
            <div className="cpanel-card">
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "15px" }}>
                <div className="cpanel-card-title" style={{ marginBottom: 0 }}>Lead Messages Inbox</div>
                <button className="cpanel-btn cpanel-btn-danger" style={{ padding: "4px 8px", fontSize: "11px" }} onClick={()=>{
                  if (confirm("Clear all lead messages?")) {
                    localStorage.setItem("portfolio_leads", "[]");
                    setLeadsList([]);
                  }
                }}>Clear All</button>
              </div>
              <div>
                {leadsList.length === 0 ? (
                  <p style={{ color: "#9aa3b8", textAlign: "center", padding: "20px" }}>No lead messages received yet.</p>
                ) : (
                  leadsList.map((lead) => (
                    <div className="lead-row" key={lead.id}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: "12.5px", color: "#9aa3b8", marginBottom: "4px" }}>
                        <div><strong>Sender: {lead.name}</strong> ({lead.email})</div>
                        <div>{lead.date}</div>
                      </div>
                      <div style={{ fontSize: "13px", fontWeight: "600", marginBottom: "4px" }}>Subject: {lead.subject}</div>
                      <div style={{ fontSize: "13px", color: "#f1f3f9", background: "rgba(255,255,255,0.02)", padding: "10px", borderRadius: "6px", marginBottom: "6px" }}>{lead.message}</div>
                      <button className="cpanel-action-btn danger" style={{ fontSize: "11.5px", color: "#ef4444" }} onClick={()=>{
                        const next = leadsList.filter(l=>l.id !== lead.id);
                        localStorage.setItem("portfolio_leads", JSON.stringify(next));
                        setLeadsList(next);
                      }}>✕ Delete Message</button>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

          {activeTab === "sync" && (
            <div className="cpanel-card">
              <div className="cpanel-card-title">Backup & Restore</div>
              <p style={{ color: "#9aa3b8", lineHeight: "1.6", marginBottom: "15px", fontSize: "14px" }}>
                Download your configurations as a JSON file, or restore default values.
              </p>
              <div style={{ display: "flex", gap: "10px" }}>
                <button className="cpanel-btn cpanel-btn-outline" onClick={()=>{
                  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                  const a = document.createElement("a");
                  a.href = URL.createObjectURL(blob);
                  a.download = "portfolio_backup.json";
                  a.click();
                }}>Download JSON configuration backup</button>
                
                <button className="cpanel-btn cpanel-btn-danger" onClick={()=>{
                  if (confirm("Reset to hardcoded defaults? This will erase all your inputs!")) {
                    saveConfig(DEFAULT_PORTFOLIO_DATA);
                    window.location.reload();
                  }
                }}>Reset to hardcoded defaults</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ---------------- Reveal-on-scroll hook ---------------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { el.classList.add("visible"); obs.unobserve(el); } });
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
const Reveal = ({ children, className = "", style }) => {
  const ref = useReveal();
  return <div ref={ref} className={`reveal ${className}`} style={style}>{children}</div>;
};

/* ---------------- Starfield ---------------- */
const Starfield = () => {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animationFrameId;
    let particles = [];
    const numParticles = Math.min(window.innerWidth / 15, 60);

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    window.addEventListener("resize", resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 1.5 + 0.5;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(124, 92, 255, 0.4)";
        ctx.fill();
      }
    }

    for (let i = 0; i < numParticles; i++) {
      particles.push(new Particle());
    }

    const render = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw(ctx);
        for (let j = i; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(124, 92, 255, ${0.15 - dist / 800})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      animationFrameId = window.requestAnimationFrame(render);
    };
    render();

    return () => {
      window.removeEventListener("resize", resize);
      window.cancelAnimationFrame(animationFrameId);
    };
  }, []);

  return <canvas ref={canvasRef} className="starfield" style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", zIndex: 0, pointerEvents: "none" }} />;
};

  const [isDragging, setIsDragging] = useState(false);
  const wrapperRef = useRef(null);
  
  const isDraggingRef = useRef(isDragging);
  const isHoveredRef = useRef(isHovered);

  useEffect(() => { isDraggingRef.current = isDragging; }, [isDragging]);
  useEffect(() => { isHoveredRef.current = isHovered; }, [isHovered]);

  const total = projectsList.length;
  const gap = 24;

  const getCardWidth = () => {
    return window.innerWidth < 640 ? window.innerWidth * 0.82 : 370;
  };

  useEffect(() => {
    if (!wrapperRef.current) return;
    const handleResize = () => setContainerWidth(wrapperRef.current.offsetWidth);
    handleResize();
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  useEffect(() => {
    const interval = setInterval(() => {
      if (isDraggingRef.current || isHoveredRef.current || total <= 1) return;
      setActiveIdx((prev) => (prev + 1) % total);
    }, 3500);
    return () => clearInterval(interval);
  }, [total]);

  const handleNext = () => { if (total > 0) setActiveIdx((prev) => (prev + 1) % total); };
  const handlePrev = () => { if (total > 0) setActiveIdx((prev) => (prev - 1 + total) % total); };

  const handleTouchStart = (e) => { setDragStart(e.touches[0].clientX); setIsDragging(true); };
  const handleTouchMove = (e) => { if (dragStart === null) return; setDragOffset(e.touches[0].clientX - dragStart); };
  const handleMouseDown = (e) => { setDragStart(e.clientX); setIsDragging(true); };
  const handleMouseMove = (e) => { if (!isDragging || dragStart === null) return; setDragOffset(e.clientX - dragStart); };

  const handleDragEnd = () => {
    if (!isDragging) return;
    const threshold = getCardWidth() / 3;
    if (dragOffset < -threshold && total > 0) {
      setActiveIdx((prev) => (prev + 1) % total);
    } else if (dragOffset > threshold && total > 0) {
      setActiveIdx((prev) => (prev - 1 + total) % total);
    }
    setDragStart(null);
    setDragOffset(0);
    setIsDragging(false);
  };

  const cardW = getCardWidth();
  const trackOffset = total > 0 ? (containerWidth / 2 - cardW / 2 - activeIdx * (cardW + gap) + dragOffset) : 0;

  return (
    <section id="projects" className="projects-section-container">
      <div className="projects-bg-glow" />
      <div className="container">
        <div className="projects-header-centered">
          <Reveal className="section-tag" style={{ marginBottom: 0 }}>
            <div className="eyebrow" style={{ textAlign: "center" }}>Featured Works</div>
          </Reveal>
          <h2>I make Incredible <span className="grad-text">Projects</span></h2>
        </div>

        <div 
          className="projects-slider-wrapper" 
          ref={wrapperRef}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleDragEnd}
          onMouseDown={handleMouseDown}
          onMouseMove={handleMouseMove}
          onMouseUp={handleDragEnd}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => {
            handleDragEnd();
            setIsHovered(false);
          }}
        >
          <div 
            className={`projects-slider-track ${isDragging ? "dragging" : ""}`}
            style={{ transform: `translateX(${trackOffset}px)` }}
          >
            {projectsList.map((p, i) => (
              <ProjectCard 
                key={i} 
                p={p} 
                i={i} 
                activeIdx={activeIdx}
                onClick={() => setActiveIdx(i)}
              />
            ))}
          </div>
        </div>

        {total > 1 && (
          <div className="projects-slider-controls">
            <button className="slider-control-btn prev" onClick={handlePrev} aria-label="Previous Project">
              <Icon name="arrow" size={18} />
            </button>
            <div className="slider-pagination">
              {projectsList.map((_, i) => (
                <div key={i} className={`slider-dot ${i === activeIdx ? "active" : ""}`} onClick={() => setActiveIdx(i)} />
              ))}
            </div>
            <button className="slider-control-btn next" onClick={handleNext} aria-label="Next Project">
              <Icon name="arrow" size={18} />
            </button>
          </div>
        )}
      </div>
    </section>
  );
};

/* ---------------- Contact ---------------- */
const Contact = ({ showToast }) => {
  const { data } = useContext(PortfolioContext);
  const contact = data.contact;
  const [form, setForm] = useState({ name: "", email: "", subject: "", message: "" });
  const onChange = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  
  const onSubmit = (e) => {
    e.preventDefault();
    const newLead = {
      id: Date.now().toString(),
      date: new Date().toLocaleString(),
      name: form.name,
      email: form.email,
      subject: form.subject,
      message: form.message
    };
    try {
      const stored = JSON.parse(localStorage.getItem("portfolio_leads") || "[]");
      stored.unshift(newLead);
      localStorage.setItem("portfolio_leads", JSON.stringify(stored));
      window.dispatchEvent(new Event("portfolio_new_lead"));
    } catch(err) {
      console.error(err);
    }
    showToast("Message sent — I'll get back to you soon!");
    setForm({ name: "", email: "", subject: "", message: "" });
  };
  
  return (
    <section id="contact">
      <div className="container">
        <Reveal className="section-tag">
          <div className="eyebrow">Contact Me</div>
          <div className="section-heading">Get In Touch</div>
        </Reveal>
        <div className="contact-grid">
          <Reveal className="contact-info">
            <p>Have a project in mind or want to work together? Feel free to send me a message.</p>
            <a href={`mailto:${contact.email}`} className="contact-item"><div className="info-icon"><Icon name="mail" size={16} /></div><div className="info-value">{contact.email}</div></a>
            <a href={`tel:${contact.phone}`} className="contact-item"><div className="info-icon"><Icon name="phone" size={16} /></div><div className="info-value">{contact.phone}</div></a>
            <div className="contact-item"><div className="info-icon"><Icon name="pin" size={16} /></div><div className="info-value">{contact.location}</div></div>

            <div className="whatsapp-cta">
              <a href={contact.whatsappUrl} target="_blank" rel="noopener noreferrer" className="btn btn-whatsapp">
                <Icon name="whatsapp" size={17} /> Chat on WhatsApp
              </a>
            </div>
          </Reveal>

          <Reveal>
            <form className="contact-form" onSubmit={onSubmit}>
              <div className="form-row">
                <div className="field"><label>Your Name</label><input required value={form.name} onChange={onChange("name")} placeholder="Jane Doe" /></div>
                <div className="field"><label>Your Email</label><input required type="email" value={form.email} onChange={onChange("email")} placeholder="jane@email.com" /></div>
              </div>
              <div className="field"><label>Subject</label><input required value={form.subject} onChange={onChange("subject")} placeholder="Let's build something" /></div>
              <div className="field"><label>Your Message</label><textarea required value={form.message} onChange={onChange("message")} placeholder="Tell me about your project..." /></div>
              <button type="submit" className="btn btn-primary btn-block">Send Message <Icon name="arrow" size={15} /></button>
            </form>
          </Reveal>
        </div>
      </div>
    </section>
  );
};

/* ---------------- App Core ---------------- */
const SECTION_IDS = ["home", "about", "skills", "certificates", "projects", "contact"];

function App() {
  const [portfolioData, setPortfolioData] = useState(() => {
    try {
      const saved = localStorage.getItem("portfolio_data");
      if (saved) return JSON.parse(saved);
    } catch(e) {
      console.error(e);
    }
    return DEFAULT_PORTFOLIO_DATA;
  });
  const [isAdminOpen, setIsAdminOpen] = useState(false);
  const [theme, setTheme] = useState("dark");
  const [active, setActive] = useState("home");
  const [toast, setToast] = useState({ show: false, msg: "" });

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => (t === "dark" ? "light" : "dark"));

  useEffect(() => {
    const onScroll = () => {
      let current = "home";
      for (const id of SECTION_IDS) {
        const el = document.getElementById(id);
        if (el && window.scrollY + 140 >= el.offsetTop) current = id;
      }
      setActive(current);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const showToast = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: "" }), 3000);
  };

  return (
    <PortfolioContext.Provider value={{ data: portfolioData, setData: setPortfolioData, isAdminOpen, setIsAdminOpen }}>
      <Nav theme={theme} toggleTheme={toggleTheme} active={active} />
      <Hero theme={theme} />
      <About />
      <Skills />
      <Certificates />
      <Projects />
      <Contact showToast={showToast} />
      <footer>
        © 2026 {portfolioData.about.name}. All rights reserved. |{" "}
        <a href="#admin" onClick={(e) => { e.preventDefault(); setIsAdminOpen(true); }} style={{ color: "var(--accent-2)", cursor: "pointer", fontWeight: "600", marginLeft: "6px" }}>
          Admin Panel
        </a>
      </footer>
      <div className={`toast ${toast.show ? "show" : ""}`}>
        <Icon name="dot" size={10} /> {toast.msg}
      </div>
      {isAdminOpen && <AdminPanel onClose={() => setIsAdminOpen(false)} />}
    </PortfolioContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

    var source = document.getElementById("app-source").textContent;
    var compiled = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]]
    }).code;
    var runnable = document.createElement("script");
