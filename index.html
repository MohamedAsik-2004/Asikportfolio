/* ---------------- Admin Cpanel Component ---------------- */
const AdminPanel = ({ onClose }) => {
  const { data, setData } = React.useContext(PortfolioContext);
  const [isLoggedIn, setIsLoggedIn] = React.useState(false);
  const [username, setUsername] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [loginError, setLoginError] = React.useState("");
  
  const [activeTab, setActiveTab] = React.useState("db");
  
  const [heroForm, setHeroForm] = React.useState({ ...data.hero });
  const [aboutForm, setAboutForm] = React.useState({ ...data.about });
  const [contactForm, setContactForm] = React.useState({ ...data.contact });
  const [skillsList, setSkillsList] = React.useState(JSON.parse(JSON.stringify(data.skills)));
  const [certsList, setCertsList] = React.useState(JSON.parse(JSON.stringify(data.certificates)));
  const [projectsList, setProjectsList] = React.useState(JSON.parse(JSON.stringify(data.projects)));
  const [leadsList, setLeadsList] = React.useState([]);

  React.useEffect(() => {
    injectAdminStyles();
    setLeadsList(JSON.parse(localStorage.getItem("portfolio_leads") || "[]"));
    const handleNews = () => setLeadsList(JSON.parse(localStorage.getItem("portfolio_leads") || "[]"));
    window.addEventListener("portfolio_new_lead", handleNews);
    return () => window.removeEventListener("portfolio_new_lead", handleNews);
  }, []);

  const handleLogin = (e) => {
    e.preventDefault();
    if (username === "admin" && password === "asik2004") {
      setIsLoggedIn(true);
      setLoginError("");
    } else {
      setLoginError("Invalid Admin Credentials!");
    }
  };

  const saveConfig = (updatedData) => {
    setData(updatedData);
    localStorage.setItem("portfolio_data", JSON.stringify(updatedData));
  };

  const handleSaveGeneral = (e) => {
    e.preventDefault();
    saveConfig({ ...data, hero: heroForm, about: aboutForm, contact: contactForm });
    alert("General settings saved!");
  };

  const handleSaveSkills = (e) => {
    e.preventDefault();
    saveConfig({ ...data, skills: skillsList });
    alert("Skills settings saved!");
  };

  const handleSaveProjects = (e) => {
    e.preventDefault();
    saveConfig({ ...data, projects: projectsList });
    alert("Projects settings saved!");
  };

  const handleSaveCerts = (e) => {
    e.preventDefault();
    saveConfig({ ...data, certificates: certsList });
    alert("Certificates settings saved!");
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setAboutForm({ ...aboutForm, avatarUrl: reader.result });
      };
      reader.readAsDataURL(file);
    }
  };

  const handleHeroImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setHeroForm({ ...heroForm, avatarUrl: reader.result });
      };
      reader.readAsDataURL(file);
    }
  };

  const handleResumeUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setHeroForm({ ...heroForm, resumeUrl: reader.result });
      };
      reader.readAsDataURL(file);
    }
  };

  const handleProjImageUpload = (idx, e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        handleProjChange(idx, "imageUrl", reader.result);
      };
      reader.readAsDataURL(file);
    }
  };

  const handleSkillChange = (cat, idx, key, val) => {
    const next = { ...skillsList };
    next[cat][idx][key] = val;
    setSkillsList(next);
  };

  const handleAddSkill = (cat) => {
    const next = { ...skillsList };
    next[cat].push({ name: "New Skill", sub: "Info", pct: 80, glyph: "⚛", bg: "#0b2a3a", fg: "#61dafb" });
    setSkillsList(next);
  };

  const handleProjChange = (idx, key, val) => {
    const next = [...projectsList];
    next[idx][key] = val;
    setProjectsList(next);
  };

  const handleCertChange = (idx, key, val) => {
    const next = [...certsList];
    next[idx][key] = val;
    setCertsList(next);
  };

  // HTML Downloader using inline source replacements
  const handleDownload = async () => {
    try {
      const res = await fetch(window.location.href);
      const text = await res.text();
      const query = "const DEFAULT_PORTFOLIO_DATA = {";
      const start = text.indexOf(query);
      const end = text.indexOf("};\n\nconst PortfolioContext =");
      if (start === -1 || end === -1) {
        // Fallback to Config download
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "portfolio_config.json";
        a.click();
        alert("Config downloaded as backup file!");
        return;
      }
      const serial = JSON.stringify(data, null, 2);
      const newHtml = text.slice(0, start) + ("const DEFAULT_PORTFOLIO_DATA = " + serial) + text.slice(end);
      const blob = new Blob([newHtml], { type: "text/html" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "portfolio_2.html";
      a.click();
    } catch(err) {
      alert("Error generating HTML: " + err.message);
    }
  };

  if (!isLoggedIn) {
    return (
      <div className="cpanel-overlay" style={{ justifyContent: "center", alignItems: "center" }}>
        <button className="cpanel-close-btn" onClick={onClose} style={{ position: "absolute", top: "20px", right: "20px" }}>✕ Exit Admin</button>
        <form className="cpanel-login-box" onSubmit={handleLogin}>
          <div className="cpanel-login-title">Admin <span>C-Panel</span></div>
          {loginError && <div className="cpanel-login-error">{loginError}</div>}
          <div className="cpanel-input-group">
            <label>Username</label>
            <input required type="text" className="cpanel-input" value={username} onChange={e=>setUsername(e.target.value)} />
          </div>
          <div className="cpanel-input-group">
            <label>Password</label>
            <input required type="password" className="cpanel-input" value={password} onChange={e=>setPassword(e.target.value)} />
          </div>
          <button type="submit" className="cpanel-btn cpanel-btn-primary" style={{ justifyContent: "center" }}>Access Dashboard</button>
        </form>
      </div>
    );
  }

  return (
    <div className="cpanel-overlay">
      <div className="cpanel-header">
        <div className="cpanel-header-title">Admin <span>C-Panel</span> Dashboard</div>
        <div style={{ display: "flex", gap: "10px" }}>
          <button className="cpanel-btn cpanel-btn-primary" onClick={handleDownload}>Save & Download HTML</button>
          <button className="cpanel-close-btn" onClick={onClose}>✕ Exit Panel</button>
        </div>
      </div>
      
      <div className="cpanel-body">
        <div className="cpanel-sidebar">
          <button className={`cpanel-sidebar-item ${activeTab==="db"?"active":""}`} onClick={()=>setActiveTab("db")}>ℹ️ Overview</button>
          <button className={`cpanel-sidebar-item ${activeTab==="hero"?"active":""}`} onClick={()=>setActiveTab("hero")}>👤 Hero & About</button>
          <button className={`cpanel-sidebar-item ${activeTab==="skills"?"active":""}`} onClick={()=>setActiveTab("skills")}>⚡ Skills</button>
          <button className={`cpanel-sidebar-item ${activeTab==="projects"?"active":""}`} onClick={()=>setActiveTab("projects")}>📂 Projects</button>
          <button className={`cpanel-sidebar-item ${activeTab==="certs"?"active":""}`} onClick={()=>setActiveTab("certs")}>🥇 Certificates</button>
          <button className={`cpanel-sidebar-item ${activeTab==="leads"?"active":""}`} onClick={()=>setActiveTab("leads")}>📥 Leads ({leadsList.length})</button>
          <button className={`cpanel-sidebar-item ${activeTab==="sync"?"active":""}`} onClick={()=>setActiveTab("sync")}>⚙️ Data sync</button>
        </div>
        
        <div className="cpanel-content">
          {activeTab === "db" && (
            <div className="cpanel-card">
              <div className="cpanel-card-title">Site Control Center</div>
              <p style={{ color: "#9aa3b8", lineHeight: "1.6", marginBottom: "15px", fontSize: "14px" }}>
                Update setting cards in any view. Save edits directly. Once you are done, click <strong>Save & Download HTML</strong> to save changes permanently.
              </p>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "15px" }}>
                <div style={{ background: "#121728", padding: "16px", borderRadius: "10px", textAlign: "center" }}>
                  <h3 style={{ fontSize: "22px" }}>{skillsList.frontend.length + skillsList.backend.length}</h3>
                  <div style={{ fontSize: "12px", color: "#9aa3b8" }}>Skills</div>
                </div>
                <div style={{ background: "#121728", padding: "16px", borderRadius: "10px", textAlign: "center" }}>
                  <h3 style={{ fontSize: "22px" }}>{projectsList.length}</h3>
                  <div style={{ fontSize: "12px", color: "#9aa3b8" }}>Projects</div>
                </div>
                <div style={{ background: "#121728", padding: "16px", borderRadius: "10px", textAlign: "center" }}>
                  <h3 style={{ fontSize: "22px" }}>{leadsList.length}</h3>

/* ---------------- Reveal-on-scroll hook ---------------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { el.classList.add("visible"); obs.unobserve(el); } });
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
const Reveal = ({ children, className = "", style }) => {
  const ref = useReveal();
  return <div ref={ref} className={`reveal ${className}`} style={style}>{children}</div>;
};

/* ---------------- Starfield ---------------- */
const Starfield = () => {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animationFrameId;
    let particles = [];
    const numParticles = Math.min(window.innerWidth / 15, 60);

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    window.addEventListener("resize", resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.radius = Math.random() * 1.5 + 0.5;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(124, 92, 255, 0.4)";
        ctx.fill();
      }
    }

    for (let i = 0; i < numParticles; i++) {
      particles.push(new Particle());
    }

    const render = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw(ctx);
        for (let j = i; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(124, 92, 255, ${0.15 - dist / 800})`;
            ctx.lineWidth = 0.6;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      animationFrameId = window.requestAnimationFrame(render);
    };
    render();

    return () => {
      window.removeEventListener("resize", resize);
      window.cancelAnimationFrame(animationFrameId);
    };
  }, []);

  return <canvas ref={canvasRef} className="starfield" style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", zIndex: 0, pointerEvents: "none" }} />;
};

const SkillCard = ({ s }) => {
  const ref = useReveal();
  const [fill, setFill] = useState(0);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { setTimeout(() => setFill(s.pct), 250); obs.unobserve(el); } });
    }, { threshold: 0.3 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [s.pct]);
  return (
    <div ref={ref} className="reveal skill-card">
      <div className="skill-icon" style={{ background: s.bg, color: s.fg, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>{s.glyph}</div>
      <div className="skill-name">{s.name}</div>
      <div className="skill-sub">{s.sub}</div>
      <div className="skill-bar"><div className="skill-bar-fill" style={{ width: `${fill}%` }} /></div>
    </div>
  );
};

const Projects = () => {
  const { data } = useContext(PortfolioContext);
  const projectsList = data.projects || [];
  const [activeIdx, setActiveIdx] = useState(0);
  const [containerWidth, setContainerWidth] = useState(1180);
  const [dragStart, setDragStart] = useState(null);
  const [dragOffset, setDragOffset] = useState(0);
  const [isHovered, setIsHovered] = useState(false);
  const [isDragging, setIsDragging] = useState(false);
  const wrapperRef = useRef(null);
  
  const isDraggingRef = useRef(isDragging);
  const isHoveredRef = useRef(isHovered);

  useEffect(() => { isDraggingRef.current = isDragging; }, [isDragging]);
  useEffect(() => { isHoveredRef.current = isHovered; }, [isHovered]);

  const total = projectsList.length;
  const gap = 24;

  const getCardWidth = () => {
    return window.innerWidth < 640 ? window.innerWidth * 0.82 : 370;
  };

  useEffect(() => {
    if (!wrapperRef.current) return;
    const handleResize = () => setContainerWidth(wrapperRef.current.offsetWidth);
    handleResize();
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  useEffect(() => {
    const interval = setInterval(() => {
      if (isDraggingRef.current || isHoveredRef.current || total <= 1) return;
      setActiveIdx((prev) => (prev + 1) % total);
    }, 3500);
    return () => clearInterval(interval);
  }, [total]);

  const handleNext = () => { if (total > 0) setActiveIdx((prev) => (prev + 1) % total); };
  const handlePrev = () => { if (total > 0) setActiveIdx((prev) => (prev - 1 + total) % total); };

  const handleTouchStart = (e) => { setDragStart(e.touches[0].clientX); setIsDragging(true); };
  const handleTouchMove = (e) => { if (dragStart === null) return; setDragOffset(e.touches[0].clientX - dragStart); };
  const handleMouseDown = (e) => { setDragStart(e.clientX); setIsDragging(true); };
  const handleMouseMove = (e) => { if (!isDragging || dragStart === null) return; setDragOffset(e.clientX - dragStart); };

  const handleDragEnd = () => {
    if (!isDragging) return;
    const threshold = getCardWidth() / 3;
    if (dragOffset < -threshold && total > 0) {
      setActiveIdx((prev) => (prev + 1) % total);
    } else if (dragOffset > threshold && total > 0) {
      setActiveIdx((prev) => (prev - 1 + total) % total);
    }
    setDragStart(null);
    setDragOffset(0);
    setIsDragging(false);
  };

  const cardW = getCardWidth();
  const trackOffset = total > 0 ? (containerWidth / 2 - cardW / 2 - activeIdx * (cardW + gap) + dragOffset) : 0;

  return (
    <section id="projects" className="projects-section-container">
      <div className="projects-bg-glow" />
      <div className="container">
        <div className="projects-header-centered">
          <Reveal className="section-tag" style={{ marginBottom: 0 }}>
            <div className="eyebrow" style={{ textAlign: "center" }}>Featured Works</div>
          </Reveal>
          <h2>I make Incredible <span className="grad-text">Projects</span></h2>
        </div>

        <div 
          className="projects-slider-wrapper" 
          ref={wrapperRef}
          onTouchStart={handleTouchStart}
          onTouchMove={handleTouchMove}
          onTouchEnd={handleDragEnd}
          onMouseDown={handleMouseDown}
          onMouseMove={handleMouseMove}
          onMouseUp={handleDragEnd}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => {
            handleDragEnd();
            setIsHovered(false);
          }}
        >
          <div 
            className={`projects-slider-track ${isDragging ? "dragging" : ""}`}
            style={{ transform: `translateX(${trackOffset}px)` }}
          >
            {projectsList.map((p, i) => (
              <ProjectCard 
                key={i} 
                p={p} 
                i={i} 
                activeIdx={activeIdx}
                onClick={() => setActiveIdx(i)}
              />
            ))}
          </div>
        </div>

        {total > 1 && (
          <div className="projects-slider-controls">
            <button className="slider-control-btn prev" onClick={handlePrev} aria-label="Previous Project">
              <Icon name="arrow" size={18} />
            </button>
            <div className="slider-pagination">
              {projectsList.map((_, i) => (
                <div key={i} className={`slider-dot ${i === activeIdx ? "active" : ""}`} onClick={() => setActiveIdx(i)} />
              ))}
            </div>
            <button className="slider-control-btn next" onClick={handleNext} aria-label="Next Project">
              <Icon name="arrow" size={18} />
            </button>
          </div>
        )}
      </div>
    </section>
  );
};

/* ---------------- Contact ---------------- */
const Contact = ({ showToast }) => {
  const { data } = useContext(PortfolioContext);
  const contact = data.contact;
  const [form, setForm] = useState({ name: "", email: "", subject: "", message: "" });
  const onChange = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  
  const onSubmit = (e) => {
    e.preventDefault();
    const newLead = {
      id: Date.now().toString(),
      date: new Date().toLocaleString(),
      name: form.name,
      email: form.email,
      subject: form.subject,
      message: form.message
    };
    try {
      const stored = JSON.parse(localStorage.getItem("portfolio_leads") || "[]");
      stored.unshift(newLead);
      localStorage.setItem("portfolio_leads", JSON.stringify(stored));
      window.dispatchEvent(new Event("portfolio_new_lead"));
    } catch(err) {
      console.error(err);
    }
    showToast("Message sent — I'll get back to you soon!");
    setForm({ name: "", email: "", subject: "", message: "" });
  };
  
  return (
    <section id="contact">
      <div className="container">
        <Reveal className="section-tag">
          <div className="eyebrow">Contact Me</div>
          <div className="section-heading">Get In Touch</div>
        </Reveal>
        <div className="contact-grid">
          <Reveal className="contact-info">
            <p>Have a project in mind or want to work together? Feel free to send me a message.</p>
            <a href={`mailto:${contact.email}`} className="contact-item"><div className="info-icon"><Icon name="mail" size={16} /></div><div className="info-value">{contact.email}</div></a>
            <a href={`tel:${contact.phone}`} className="contact-item"><div className="info-icon"><Icon name="phone" size={16} /></div><div className="info-value">{contact.phone}</div></a>
            <div className="contact-item"><div className="info-icon"><Icon name="pin" size={16} /></div><div className="info-value">{contact.location}</div></div>

            <div className="whatsapp-cta">
              <a href={contact.whatsappUrl} target="_blank" rel="noopener noreferrer" className="btn btn-whatsapp">
                <Icon name="whatsapp" size={17} /> Chat on WhatsApp
              </a>
            </div>
          </Reveal>

          <Reveal>
            <form className="contact-form" onSubmit={onSubmit}>
              <div className="form-row">
                <div className="field"><label>Your Name</label><input required value={form.name} onChange={onChange("name")} placeholder="Jane Doe" /></div>
                <div className="field"><label>Your Email</label><input required type="email" value={form.email} onChange={onChange("email")} placeholder="jane@email.com" /></div>
              </div>
              <div className="field"><label>Subject</label><input required value={form.subject} onChange={onChange("subject")} placeholder="Let's build something" /></div>
              <div className="field"><label>Your Message</label><textarea required value={form.message} onChange={onChange("message")} placeholder="Tell me about your project..." /></div>
              <button type="submit" className="btn btn-primary btn-block">Send Message <Icon name="arrow" size={15} /></button>
            </form>
          </Reveal>
        </div>
      </div>
    </section>
  );
};

/* ---------------- App Core ---------------- */
const SECTION_IDS = ["home", "about", "skills", "certificates", "projects", "contact"];

function App() {
  const [portfolioData, setPortfolioData] = useState(() => {
    try {
      const saved = localStorage.getItem("portfolio_data");
      if (saved) return JSON.parse(saved);
    } catch(e) {
      console.error(e);
    }
    return DEFAULT_PORTFOLIO_DATA;
  });
  const [isAdminOpen, setIsAdminOpen] = useState(false);
  const [theme, setTheme] = useState("dark");
  const [active, setActive] = useState("home");
  const [toast, setToast] = useState({ show: false, msg: "" });

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const toggleTheme = () => setTheme(t => (t === "dark" ? "light" : "dark"));

  useEffect(() => {
    const onScroll = () => {
      let current = "home";
      for (const id of SECTION_IDS) {
        const el = document.getElementById(id);
        if (el && window.scrollY + 140 >= el.offsetTop) current = id;
      }
      setActive(current);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const showToast = (msg) => {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: "" }), 3000);
  };

  return (
    <PortfolioContext.Provider value={{ data: portfolioData, setData: setPortfolioData, isAdminOpen, setIsAdminOpen }}>
      <Nav theme={theme} toggleTheme={toggleTheme} active={active} />
      <Hero theme={theme} />
      <About />
      <Skills />
      <Certificates />
      <Projects />
      <Contact showToast={showToast} />
      <footer>
        © 2026 {portfolioData.about.name}. All rights reserved. |{" "}
        <a href="#admin" onClick={(e) => { e.preventDefault(); setIsAdminOpen(true); }} style={{ color: "var(--accent-2)", cursor: "pointer", fontWeight: "600", marginLeft: "6px" }}>
          Admin Panel
        </a>
      </footer>
      <div className={`toast ${toast.show ? "show" : ""}`}>
        <Icon name="dot" size={10} /> {toast.msg}
      </div>
      {isAdminOpen && <AdminPanel onClose={() => setIsAdminOpen(false)} />}
    </PortfolioContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    // Manually compile the JSX source with the classic runtime so it works
    // as a plain script (avoids Babel's automatic runtime, which injects an
    // `import` statement that breaks in a non-module <script> tag).
    var source = document.getElementById("app-source").textContent;
    var compiled = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]]
    }).code;
    var runnable = document.createElement("script");
    runnable.textContent = compiled;
    document.body.appendChild(runnable);
  </script>
</body>
